[NEAT]
fitness_criterion     = max
fitness_threshold     = 1e9
pop_size              = 150
reset_on_extinction   = True
no_fitness_termination = True

[DefaultGenome]
num_inputs              = 4
num_outputs              = 1
num_hidden               = 0
feed_forward              = True
initial_connection        = full

# CPPN-defining setting: without this, every genome stays sigmoid forever
# (neat-python's own example configs default to activation_mutate_rate=0.0),
# which silently degrades the whole "evolved CPPN" premise back to an
# evolved-but-homogeneous MLP. Keep 'random' + a nonzero mutate rate +
# multiple options, always.
activation_default        = random
activation_mutate_rate    = 0.2
activation_options        = sigmoid tanh sin gauss relu identity abs clamped

aggregation_default        = sum
aggregation_mutate_rate    = 0.0
aggregation_options        = sum

bias_init_mean            = 0.0
bias_init_stdev           = 1.0
bias_max_value             = 30.0
bias_min_value             = -30.0
bias_mutate_power          = 0.5
bias_mutate_rate           = 0.7
bias_replace_rate          = 0.1

response_init_mean         = 1.0
response_init_stdev        = 0.0
response_max_value          = 30.0
response_min_value          = -30.0
response_mutate_power       = 0.0
response_mutate_rate        = 0.0
response_replace_rate       = 0.0

weight_init_mean           = 0.0
weight_init_stdev          = 1.0
weight_max_value            = 30.0
weight_min_value            = -30.0
weight_mutate_power         = 0.5
weight_mutate_rate          = 0.8
weight_replace_rate         = 0.1

enabled_default            = True
enabled_mutate_rate        = 0.01

conn_add_prob               = 0.5
conn_delete_prob            = 0.5
node_add_prob                = 0.2
node_delete_prob             = 0.2
single_structural_mutation   = False
structural_mutation_surer    = default

compatibility_disjoint_coefficient = 1.0
compatibility_weight_coefficient   = 0.5

[DefaultSpeciesSet]
compatibility_threshold = 3.0

[DefaultStagnation]
species_fitness_func = max
max_stagnation        = 20
species_elitism       = 2

[DefaultReproduction]
elitism            = 2
survival_threshold = 0.2
min_species_size   = 2
