dataset_name: cifar_10
model_name: resnet18
pretrained: true
input_channels: 3
num_classes: 10
image_size: 32
batch_size: 64
train_size_percent: 0.80
val_size_percent: 0.10
seed: 0
data_root: ./data

teacher:
  num_epochs: 100
  lr: 0.1
  momentum: 0.9

student:
  num_epochs: 100
  lr: 0.1
  momentum: 0.9
  temperature: 4
  alpha: 0.9

cppn:
  neat_config: configs/neat/cppn_neat.cfg
  view_op: multiplicative
  view_scale: 0.5
  tau_low: 0.3
  tau_high: 0.7
  gamma: 0.0
  probe_batch_size: 256
  num_generations: 40
  top_k: 5
  random_seed: 0

trained_cppn:
  num_steps: 500
  probe_batch_size: 256
  lr: 0.01
  temperature: 4
  diversity_weight: 1.0
  kl_weight: 1.0
